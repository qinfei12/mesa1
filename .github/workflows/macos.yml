name: macOS-CI
on: push

permissions:
  contents: read

jobs:
  macOS-CI:
    strategy:
      matrix:
        glx_option: ['xlib']  # 只留 xlib，dri 在 macOS 无效
    runs-on: macos-latest
    env:
      GALLIUM_DUMP_CPU: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Dependencies
      run: |
        cat > Brewfile <<EOL
        brew "bison"
        brew "expat"
        brew "gettext"
        brew "libx11"
        brew "libxcb"
        brew "libxdamage"
        brew "libxext"
        brew "molten-vk"
        brew "ninja"
        brew "pkg-config"
        brew "python@3.10"
        brew "llvm"
        EOL

        brew update
        brew bundle --verbose
    - name: Install Mako and meson
      run: python3 -m pip install --user mako meson
    - name: Configure
      run: |
        cat > native_config <<EOL
        [binaries]
        llvm-config = '/opt/homebrew/opt/llvm/bin/llvm-config'
        EOL
        meson . build --native-file=native_config -Dmoltenvk-dir=$(brew --prefix molten-vk) -Dbuild-tests=true -Dosmesa=true -Dgallium-drivers=swrast,zink -Dglx=${{ matrix.glx_option }}
    - name: Build
      run: meson compile -C build
    - name: Test
      run: meson test -C build --print-errorlogs
    - name: Install
      run: meson install -C build --destdir $PWD/install
    - name: 'Upload Artifact'
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: macos-${{ matrix.glx_option }}-result
        path: |
          build/meson-logs/
          install/
        retention-days: 5
